# version: '3.9'

services:
  db:
    image: pgvector/pgvector:pg18 # PostgreSQL 18 with pgvector pre-installed
    environment:
      POSTGRES_DB: traveldeals
      POSTGRES_USER: tduser
      POSTGRES_PASSWORD: tdpass
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - '5432:5432'

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000 # dev mode
    volumes:
      - ./backend:/app
    ports:
      - '8000:8000'
    env_file: .env
    depends_on:
      - db

  frontend:
    build: ./frontend
    command: npm run dev # dev mode
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
